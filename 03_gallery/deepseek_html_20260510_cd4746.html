<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube Style Video Gallery | 3x3 Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #272727;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            background: linear-gradient(135deg, #ff0000, #ff4d4d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .url-control {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #202020;
            padding: 8px 15px;
            border-radius: 40px;
        }

        .url-control label {
            font-size: 0.85rem;
            color: #aaa;
        }

        .url-control select {
            background: #303030;
            color: white;
            border: 1px solid #3f3f3f;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .reset-btn {
            background: #3f3f3f;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #ff4d4d;
        }

        /* グリッドレイアウト: 3行3列 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 動画カード */
        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5);
        }

        /* サムネイルコンテナ */
        .thumbnail-container {
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            overflow: hidden;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .video-card:hover .thumbnail {
            transform: scale(1.05);
        }

        /* 再生ボタンオーバーレイ */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            padding-left: 4px;
        }

        /* カード情報 */
        .card-info {
            padding: 12px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-name {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* モーダル (動画再生用) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
        }

        .modal-iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 32px;
            color: white;
            background: rgba(0,0,0,0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            z-index: 10;
        }

        .close-modal:hover {
            background: #ff0000;
            transform: scale(1.05);
        }

        /* レスポンシブ: スマホでは1~2列に変更 */
        @media (max-width: 800px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            body {
                padding: 12px;
            }
        }

        @media (max-width: 500px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            .header {
                flex-direction: column;
                gap: 15px;
            }
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            border-top: 1px solid #272727;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎬 Video Gallery</h1>
        <div class="url-control">
            <label>✏️ 動画URL変更:</label>
            <select id="videoSelector">
                <option value="0">カード 1 (サンプル動画)</option>
                <option value="1">カード 2 (風景映像)</option>
                <option value="2">カード 3 (音楽MV)</option>
                <option value="3">カード 4 (テックレビュー)</option>
                <option value="4">カード 5 (ゲーム実況)</option>
                <option value="5">カード 6 (ドキュメンタリー)</option>
                <option value="6">カード 7 (料理動画)</option>
                <option value="7">カード 8 (スポーツ)</option>
                <option value="8">カード 9 (Vlog)</option>
            </select>
            <input type="text" id="newUrlInput" placeholder="YouTube URLを入力" style="padding: 6px 12px; border-radius: 30px; border: none; min-width: 200px;">
            <button id="updateUrlBtn" class="reset-btn">更新</button>
            <button id="resetDefaultBtn" class="reset-btn">🔁 全デフォルト復元</button>
        </div>
    </div>

    <!-- 3x3 グリッド -->
    <div class="video-grid" id="videoGrid"></div>
    <footer>
        ⚡ 各カードをクリックで動画再生 | URLはリアルタイムで変更可能 (YouTube対応)
    </footer>
</div>

<!-- モーダル -->
<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <iframe id="modalIframe" class="modal-iframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    // ======================== // URL設定エリア ========================
    // 初期データ: 9つの動画 (YouTube URL, タイトル, チャンネル名)
    let videoData = [
        { url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ", title: "Never Gonna Give You Up", channel: "Rick Astley" },
        { url: "https://youtu.be/6Dh-RL__uN4", title: "4K Amazing Nature Scenery", channel: "Nature Relax" },
        { url: "https://www.youtube.com/watch?v=kJQP7kiw5Fk", title: "Lofi Hip Hop Radio", channel: "Lofi Girl" },
        { url: "https://youtu.be/8dG7eR9H-kU", title: "スマホ最新モデル徹底解説", channel: "TechGadget" },
        { url: "https://www.youtube.com/watch?v=5qap5aO4i9A", title: "【Minecraft】 神シード発見", channel: "GameKing" },
        { url: "https://youtu.be/Dw_oH5oi4Z4", title: "地球の神秘 深海の世界", channel: "Discovery Japan" },
        { url: "https://www.youtube.com/watch?v=2Q_ZzBGPdqE", title: "プロが教える絶品パスタ", channel: "K Cooking" },
        { url: "https://youtu.be/zfljBx8RTQc", title: "バスケ 奇跡の逆転劇", channel: "Sports Highlights" },
        { url: "https://www.youtube.com/watch?v=6v2L2UGZJAM", title: "Tokyo Vlog | 渋谷〜浅草", channel: "TravelerMiku" }
    ];

    // YouTubeの動画IDを抽出する関数 (標準URL / youtu.be 両対応)
    function extractVideoId(url) {
        if (!url) return null;
        // 正規表現: youtu.be または watch?v= または embed/ 対応
        let patterns = [
            /(?:youtube\.com\/watch\?v=)([\w-]+)/i,
            /(?:youtu\.be\/)([\w-]+)/i,
            /(?:youtube\.com\/embed\/)([\w-]+)/i,
            /(?:youtube\.com\/v\/)([\w-]+)/i
        ];
        for (let pattern of patterns) {
            let match = url.match(pattern);
            if (match && match[1]) return match[1];
        }
        // もし単純に動画IDだけが直接入力された場合のフォールバック (11文字の英数字)
        let simpleMatch = url.match(/([\w-]{11})/);
        if (simpleMatch && simpleMatch[1].length === 11) return simpleMatch[1];
        return null;
    }

    // サムネイルURLを取得
    function getThumbnailUrl(videoId) {
        return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    }

    // 動画の埋め込み用URL (iframe用)
    function getEmbedUrl(videoId) {
        return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
    }

    // 動画データを元にカードを再描画 (グリッド完全構築)
    function renderGallery() {
        const grid = document.getElementById('videoGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        videoData.forEach((video, idx) => {
            const videoId = extractVideoId(video.url);
            let thumbUrl = '';
            let valid = true;
            if (videoId) {
                thumbUrl = getThumbnailUrl(videoId);
            } else {
                // 無効なURLの場合はプレースホルダー
                thumbUrl = 'https://via.placeholder.com/320x180?text=Invalid+URL';
                valid = false;
            }
            
            // タイトルやチャンネルが空欄なら補完
            const title = video.title || `動画 ${idx+1}`;
            const channel = video.channel || 'チャンネル不明';
            
            const card = document.createElement('div');
            card.className = 'video-card';
            card.setAttribute('data-index', idx);
            // data属性に現在のURLも保持 (クリック時取得)
            card.setAttribute('data-url', video.url);
            
            card.innerHTML = `
                <div class="thumbnail-container">
                    <img class="thumbnail" src="${thumbUrl}" alt="thumbnail" loading="lazy"
                         onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumbnail'">
                    <div class="play-overlay">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
                <div class="card-info">
                    <div class="video-title">${escapeHtml(title)}</div>
                    <div class="channel-name">${escapeHtml(channel)}</div>
                </div>
            `;
            
            // クリックイベントでモーダル開く
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetUrl = card.getAttribute('data-url');
                const targetVideoId = extractVideoId(targetUrl);
                if (targetVideoId) {
                    openModal(targetVideoId);
                } else {
                    alert("この動画URLは無効です。正しいYouTube URLを設定してください。\n例: https://www.youtube.com/watch?v=VIDEO_ID");
                }
            });
            
            grid.appendChild(card);
        });
        
        // 更新後、セレクトボックスの選択肢ラベルも同期 (オプション)
        updateSelectorLabels();
    }
    
    // シンプルなXSS対策
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // モーダル関連
    const modal = document.getElementById('videoModal');
    const modalIframe = document.getElementById('modalIframe');
    const closeModalBtn = document.querySelector('.close-modal');
    
    function openModal(videoId) {
        const embedUrl = getEmbedUrl(videoId);
        modalIframe.src = embedUrl;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        modal.style.display = 'none';
        modalIframe.src = '';  // 停止
        document.body.style.overflow = '';
    }
    
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    
    // 特定インデックスの動画URLとタイトル/チャンネルを更新 (URLのみなら自動タイトル補完も可: 拡張)
    function updateVideoUrl(index, newUrl, customTitle = null, customChannel = null) {
        if (index < 0 || index >= videoData.length) return false;
        // URL更新前にバリデーション: VideoIdが取れなくても警告は出しても保存はする
        const testId = extractVideoId(newUrl);
        if (!testId && newUrl.trim() !== "") {
            if (!confirm(`⚠️ 有効なYouTube動画IDが見つかりませんでした。\nそれでもこのURLを設定しますか？ (${newUrl})`)) {
                return false;
            }
        }
        videoData[index].url = newUrl;
        if (customTitle) videoData[index].title = customTitle;
        if (customChannel) videoData[index].channel = customChannel;
        
        // もしタイトルが未設定でIDが取れる場合、"動画タイトル" を簡単なものに変更 (親切)
        if (!customTitle && testId && (!videoData[index].title || videoData[index].title === `動画 ${index+1}`)) {
            videoData[index].title = `YouTube動画 (${testId.substring(0,6)}...)`;
        }
        
        renderGallery(); // 再描画
        return true;
    }
    
    // デフォルト値にリセット
    function resetToDefault() {
        videoData = [
            { url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ", title: "Never Gonna Give You Up", channel: "Rick Astley" },
            { url: "https://youtu.be/6Dh-RL__uN4", title: "4K Amazing Nature Scenery", channel: "Nature Relax" },
            { url: "https://www.youtube.com/watch?v=kJQP7kiw5Fk", title: "Lofi Hip Hop Radio", channel: "Lofi Girl" },
            { url: "https://youtu.be/8dG7eR9H-kU", title: "スマホ最新モデル徹底解説", channel: "TechGadget" },
            { url: "https://www.youtube.com/watch?v=5qap5aO4i9A", title: "【Minecraft】 神シード発見", channel: "GameKing" },
            { url: "https://youtu.be/Dw_oH5oi4Z4", title: "地球の神秘 深海の世界", channel: "Discovery Japan" },
            { url: "https://www.youtube.com/watch?v=2Q_ZzBGPdqE", title: "プロが教える絶品パスタ", channel: "K Cooking" },
            { url: "https://youtu.be/zfljBx8RTQc", title: "バスケ 奇跡の逆転劇", channel: "Sports Highlights" },
            { url: "https://www.youtube.com/watch?v=6v2L2UGZJAM", title: "Tokyo Vlog | 渋谷〜浅草", channel: "TravelerMiku" }
        ];
        renderGallery();
    }
    
    // セレクトボックスのラベルテキストを最新タイトルに同期 (使いやすさ)
    function updateSelectorLabels() {
        const selector = document.getElementById('videoSelector');
        if (!selector) return;
        for (let i = 0; i < selector.options.length && i < videoData.length; i++) {
            let shortTitle = videoData[i].title.length > 20 ? videoData[i].title.substring(0,18)+"..." : videoData[i].title;
            selector.options[i].text = `カード ${i+1}: ${shortTitle}`;
        }
    }
    
    // UI操作: 更新ボタン
    document.getElementById('updateUrlBtn').addEventListener('click', () => {
        const selectedIdx = parseInt(document.getElementById('videoSelector').value, 10);
        const newUrl = document.getElementById('newUrlInput').value.trim();
        if (!newUrl) {
            alert("YouTube URLを入力してください。");
            return;
        }
        if (updateVideoUrl(selectedIdx, newUrl)) {
            document.getElementById('newUrlInput').value = '';
            alert(`カード ${selectedIdx+1} のURLを更新しました！`);
        }
    });
    
    document.getElementById('resetDefaultBtn').addEventListener('click', () => {
        if (confirm("全ての動画URL・タイトルをデフォルトに戻しますか？")) {
            resetToDefault();
            alert("デフォルトのギャラリーに復元しました。");
        }
    });
    
    // 初期表示
    renderGallery();
</script>
</body>
</html>
