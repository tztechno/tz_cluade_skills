<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube Style Video Gallery | 3x3 Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: #0f0f0f;
            color: #f1f1f1;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #272727;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 500;
            background: linear-gradient(135deg, #ff0000, #ff4d4d);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .url-control {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #202020;
            padding: 8px 15px;
            border-radius: 40px;
            flex-wrap: wrap;
        }

        .url-control label {
            font-size: 0.85rem;
            color: #aaa;
        }

        .url-control select {
            background: #303030;
            color: white;
            border: 1px solid #3f3f3f;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .url-control input {
            padding: 6px 12px;
            border-radius: 30px;
            border: none;
            min-width: 220px;
            background: #303030;
            color: white;
        }

        .url-control input::placeholder {
            color: #888;
        }

        .btn {
            background: #3f3f3f;
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn:hover {
            background: #ff4d4d;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 40px;
        }

        .video-card {
            background: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .video-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.5);
        }

        .thumbnail-container {
            position: relative;
            background: #1a1a1a;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .thumbnail-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #2a2a2a;
            color: #666;
            font-size: 0.8rem;
        }

        .video-card:hover .thumbnail {
            transform: scale(1.05);
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
        }

        .play-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 0, 0, 0.85);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            padding-left: 4px;
        }

        .card-info {
            padding: 12px;
        }

        .video-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 6px;
            word-break: break-word;
            color: #f1f1f1;
        }

        .channel-name {
            font-size: 0.8rem;
            color: #aaa;
        }

        .empty-field {
            color: #555;
            font-style: italic;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        .modal-iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
        }

        .close-modal {
            position: absolute;
            top: 12px;
            right: 20px;
            font-size: 32px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            z-index: 10;
        }

        .close-modal:hover {
            background: #ff0000;
        }

        .error-message {
            background: #2a0000;
            color: #ff8888;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        @media (max-width: 800px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            body {
                padding: 12px;
            }
        }

        @media (max-width: 500px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
            border-top: 1px solid #272727;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎬 Video Gallery</h1>
        <div class="url-control">
            <label>📹 カード選択:</label>
            <select id="videoSelector">
                <option value="0">カード 1</option>
                <option value="1">カード 2</option>
                <option value="2">カード 3</option>
                <option value="3">カード 4</option>
                <option value="4">カード 5</option>
                <option value="5">カード 6</option>
                <option value="6">カード 7</option>
                <option value="7">カード 8</option>
                <option value="8">カード 9</option>
            </select>
            <input type="text" id="newUrlInput" placeholder="YouTube URLを入力">
            <input type="text" id="newTitleInput" placeholder="タイトル (任意)">
            <input type="text" id="newChannelInput" placeholder="チャンネル名 (任意)">
            <button id="updateUrlBtn" class="btn">更新</button>
            <button id="resetDefaultBtn" class="btn">🔁 全リセット</button>
        </div>
    </div>

    <div class="video-grid" id="videoGrid"></div>
    <footer>
        ⚡ カードクリックで再生 | URL・タイトル・チャンネルは自由に設定可能
    </footer>
</div>

<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <iframe id="modalIframe" class="modal-iframe" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    // ======================== データ定義（デフォルトは空） ========================
    let videoData = [
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" },
        { url: "", title: "", channel: "" }
    ];

    // YouTube動画ID抽出（厳密版）
    function extractVideoId(url) {
        if (!url || typeof url !== 'string') return null;
        const patterns = [
            /(?:youtube\.com\/watch\?v=)([\w-]{11})/i,
            /(?:youtu\.be\/)([\w-]{11})/i,
            /(?:youtube\.com\/embed\/)([\w-]{11})/i,
            /(?:youtube\.com\/v\/)([\w-]{11})/i,
            /^([\w-]{11})$/  // 直接ID入力
        ];
        for (let pattern of patterns) {
            const match = url.match(pattern);
            if (match && match[1] && match[1].length === 11) {
                return match[1];
            }
        }
        return null;
    }

    // サムネイルURL取得
    function getThumbnailUrl(videoId) {
        return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
    }

    // 埋め込みURL
    function getEmbedUrl(videoId) {
        return `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
    }

    // HTMLエスケープ
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ギャラリー描画
    function renderGallery() {
        const grid = document.getElementById('videoGrid');
        if (!grid) return;
        grid.innerHTML = '';
        
        videoData.forEach((video, idx) => {
            const videoId = extractVideoId(video.url);
            const hasValidUrl = videoId !== null && video.url.trim() !== '';
            
            // タイトル/チャンネル表示（空ならプレースホルダー）
            const title = video.title && video.title.trim() ? escapeHtml(video.title) : '<span class="empty-field">未設定</span>';
            const channel = video.channel && video.channel.trim() ? escapeHtml(video.channel) : '<span class="empty-field">チャンネル未設定</span>';
            
            const card = document.createElement('div');
            card.className = 'video-card';
            card.setAttribute('data-index', idx);
            card.setAttribute('data-url', video.url);
            
            // サムネイル部分
            let thumbnailHtml = '';
            if (hasValidUrl && videoId) {
                thumbnailHtml = `<img class="thumbnail" src="${getThumbnailUrl(videoId)}" alt="thumbnail" 
                                 onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'thumbnail-placeholder\'>📷 サムネイル取得失敗</div>';">`;
            } else {
                thumbnailHtml = `<div class="thumbnail-placeholder">🎬 有効なYouTube URLを設定してください</div>`;
            }
            
            card.innerHTML = `
                <div class="thumbnail-container">
                    ${thumbnailHtml}
                    <div class="play-overlay">
                        <div class="play-icon">▶</div>
                    </div>
                </div>
                <div class="card-info">
                    <div class="video-title">${title}</div>
                    <div class="channel-name">${channel}</div>
                </div>
            `;
            
            // クリックイベント（エラーチェック強化）
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const targetUrl = card.getAttribute('data-url');
                if (!targetUrl || targetUrl.trim() === '') {
                    alert('❌ 動画URLが設定されていません。上部のコントロールパネルでURLを設定してください。');
                    return;
                }
                const targetVideoId = extractVideoId(targetUrl);
                if (!targetVideoId) {
                    alert(`❌ 無効なYouTube URLです。\n入力値: ${targetUrl}\n\n正しい形式: https://www.youtube.com/watch?v=VIDEO_ID または https://youtu.be/VIDEO_ID`);
                    return;
                }
                openModal(targetVideoId);
            });
            
            grid.appendChild(card);
        });
        
        updateSelectorLabels();
    }
    
    // セレクトボックスのラベル更新
    function updateSelectorLabels() {
        const selector = document.getElementById('videoSelector');
        if (!selector) return;
        for (let i = 0; i < selector.options.length && i < videoData.length; i++) {
            const title = videoData[i].title && videoData[i].title.trim() 
                ? (videoData[i].title.length > 15 ? videoData[i].title.substring(0, 12) + '...' : videoData[i].title)
                : '未設定';
            selector.options[i].text = `カード ${i+1}: ${title}`;
        }
    }
    
    // モーダル関連
    const modal = document.getElementById('videoModal');
    const modalIframe = document.getElementById('modalIframe');
    const closeModalBtn = document.querySelector('.close-modal');
    
    function openModal(videoId) {
        const embedUrl = getEmbedUrl(videoId);
        modalIframe.src = embedUrl;
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
        modal.style.display = 'none';
        modalIframe.src = '';
        document.body.style.overflow = '';
    }
    
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
    
    // データ更新関数
    function updateVideoCard(index, url, title, channel) {
        if (index < 0 || index >= videoData.length) return false;
        
        if (url !== undefined) videoData[index].url = url.trim();
        if (title !== undefined) videoData[index].title = title.trim();
        if (channel !== undefined) videoData[index].channel = channel.trim();
        
        renderGallery();
        return true;
    }
    
    // 全リセット（全て空白に）
    function resetAll() {
        videoData = [
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" },
            { url: "", title: "", channel: "" }
        ];
        renderGallery();
    }
    
    // UIイベント
    document.getElementById('updateUrlBtn').addEventListener('click', () => {
        const selectedIdx = parseInt(document.getElementById('videoSelector').value, 10);
        const newUrl = document.getElementById('newUrlInput').value;
        const newTitle = document.getElementById('newTitleInput').value;
        const newChannel = document.getElementById('newChannelInput').value;
        
        if (!newUrl && !newTitle && !newChannel) {
            alert('更新する内容（URL / タイトル / チャンネル）を入力してください。');
            return;
        }
        
        updateVideoCard(selectedIdx, newUrl || undefined, newTitle || undefined, newChannel || undefined);
        
        // 入力欄クリア
        document.getElementById('newUrlInput').value = '';
        document.getElementById('newTitleInput').value = '';
        document.getElementById('newChannelInput').value = '';
    });
    
    document.getElementById('resetDefaultBtn').addEventListener('click', () => {
        if (confirm('全てのカードを空の状態にリセットしますか？\n（設定したURL・タイトル・チャンネルが消えます）')) {
            resetAll();
        }
    });
    
    // 初期描画
    renderGallery();
</script>
</body>
</html>
